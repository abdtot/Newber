<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c7873">
    <title>سيستار برو - بصمة الجهاز</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a4a46 0%, #2c7873 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2c7873, #1a4a46);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px -5px rgba(44, 120, 115, 0.3);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
        }

        .login-header p {
            font-size: 14px;
            color: #475569;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            transition: all 0.3s ease;
            background: #f1f5f9;
        }

        .input-group:focus-within {
            border-color: #2c7873;
            box-shadow: 0 0 0 3px rgba(44, 120, 115, 0.1);
        }

        .input-icon {
            padding: 0 15px;
            color: #2c7873;
        }

        .input-group input {
            flex: 1;
            padding: 15px 0;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
        }

        .toggle-password {
            padding: 0 15px;
            cursor: pointer;
            color: #475569;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #475569;
        }

        .forgot-password {
            color: #2c7873;
            text-decoration: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2c7873, #1a4a46);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(44, 120, 115, 0.4);
        }

        .biometric-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2c7873, #1a4a46);
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
        }

        .biometric-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(44, 120, 115, 0.4);
        }

        .biometric-btn i {
            font-size: 24px;
            color: white;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #475569;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            margin: 0 15px;
        }

        .security-badge {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .biometric-status {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .biometric-status.show {
            display: block;
        }

        .alert-message {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .alert-message.show {
            display: flex;
        }

        .fingerprint-icon {
            font-size: 80px;
            color: #2c7873;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        .pulse-animation {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-water"></i>
                </div>
                <h1>سيستار برو</h1>
                <p>نظام إدارة الآبار الذكي</p>
            </div>

            <div class="biometric-status" id="biometricStatus">
                <i class="fas fa-info-circle"></i> <span id="biometricStatusText">جاري التحقق...</span>
            </div>

            <div class="alert-message" id="alertMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alertText"></span>
            </div>

            <!-- زر البصمة الرئيسي - واضح وكبير -->
            <button class="biometric-btn" id="biometricLoginBtn">
                <i class="fas fa-fingerprint"></i>
                <span>سجل الدخول بصمة الإصبع</span>
            </button>

            <div class="divider">
                <span>أو</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-icon"><i class="fas fa-user"></i></span>
                        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <span class="input-icon"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
                        <span class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye-slash" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> تذكرني
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>تسجيل الدخول</span>
                </button>
            </form>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>FIDO2 WebAuthn</span>
                <i class="fas fa-fingerprint"></i>
                <span>بصمة جهاز أندرويد</span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // سيستار برو - بصمة الجهاز الحقيقية
        // بدون كتابة اسم مستخدم - يستخدم بصمة الأندرويد مباشرة
        // ==========================================

        // مستخدم واحد فقط للتطبيق (المستخدم الحالي للجهاز)
        let appUser = null;
        
        // تخزين بيانات المستخدم (يمكن أن يكون أكثر من مستخدم للتطبيق)
        let users = [];

        function loadUsers() {
            const saved = localStorage.getItem('systar_users_fingerprint');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                // مستخدم افتراضي
                users = [{
                    id: 1,
                    username: 'admin',
                    password: btoa('admin123'),
                    deviceId: null,  // سيتم تخزين معرف الجهاز بعد تسجيل البصمة
                    hasBiometric: false,
                    createdAt: new Date().toISOString()
                }];
                saveUsers();
            }
        }

        function saveUsers() {
            localStorage.setItem('systar_users_fingerprint', JSON.stringify(users));
        }

        // ------------------- WebAuthn API - بصمة الجهاز الحقيقية -------------------
        
        function isWebAuthnSupported() {
            return window.PublicKeyCredential !== undefined && 
                   typeof window.PublicKeyCredential === 'function';
        }

        async function isBiometricAvailable() {
            if (!isWebAuthnSupported()) return false;
            try {
                const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                return available;
            } catch (error) {
                console.error('Biometric check error:', error);
                return false;
            }
        }

        async function getAuthenticatorType() {
            if (!await isBiometricAvailable()) return null;
            
            const ua = navigator.userAgent.toLowerCase();
            if (ua.includes('android')) return 'بصمة الأندرويد';
            if (ua.includes('windows')) return 'Windows Hello';
            if (ua.includes('mac')) return 'Touch ID';
            if (ua.includes('iphone') || ua.includes('ipad')) return 'Face ID / Touch ID';
            return 'المصادقة البيومترية';
        }

        // توليد معرف فريد للجهاز
        function generateDeviceId() {
            return 'device_' + Date.now() + '_' + Math.random().toString(36).substring(2, 15);
        }

        // تسجيل بصمة الجهاز (ربط التطبيق ببصمة الأندرويد)
        async function registerDeviceBiometric(username) {
            if (!await isBiometricAvailable()) {
                throw new Error('جهازك لا يدعم المصادقة البيومترية');
            }

            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                
                const publicKeyCredentialCreationOptions = {
                    challenge: challenge,
                    rp: {
                        name: "سيستار برو",
                        id: window.location.hostname === 'localhost' ? 'localhost' : window.location.hostname
                    },
                    user: {
                        id: new TextEncoder().encode(username + '_' + Date.now()),
                        name: username,
                        displayName: username
                    },
                    pubKeyCredParams: [
                        { alg: -7, type: "public-key" },
                        { alg: -257, type: "public-key" }
                    ],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        userVerification: "required",
                        requireResidentKey: false
                    },
                    timeout: 60000,
                    attestation: "none"
                };

                const credential = await navigator.credentials.create({
                    publicKey: publicKeyCredentialCreationOptions
                });

                const credentialData = {
                    id: credential.id,
                    rawId: Array.from(new Uint8Array(credential.rawId)),
                    type: credential.type,
                    username: username,
                    deviceId: generateDeviceId(),
                    registeredAt: new Date().toISOString()
                };
                
                localStorage.setItem('biometric_device_' + username, JSON.stringify(credentialData));
                
                const user = users.find(u => u.username === username);
                if (user) {
                    user.hasBiometric = true;
                    user.deviceId = credentialData.deviceId;
                    saveUsers();
                }
                
                return credentialData;
            } catch (error) {
                console.error('Biometric registration error:', error);
                throw new Error('فشل تسجيل البصمة: ' + error.message);
            }
        }

        // المصادقة باستخدام بصمة الجهاز (دون كتابة اسم مستخدم)
        // هذه الدالة ستظهر نافذة بصمة الأندرويد مباشرة
        async function authenticateWithDeviceBiometric() {
            if (!await isBiometricAvailable()) {
                throw new Error('جهازك لا يدعم المصادقة البيومترية');
            }

            // البحث عن أي مستخدم لديه بصمة مسجلة على هذا الجهاز
            let foundUser = null;
            let foundCredential = null;
            
            for (const user of users) {
                if (user.hasBiometric) {
                    const savedCred = localStorage.getItem('biometric_device_' + user.username);
                    if (savedCred) {
                        foundUser = user;
                        foundCred = JSON.parse(savedCred);
                        break;
                    }
                }
            }
            
            if (!foundUser || !foundCred) {
                throw new Error('لا توجد بصمة مسجلة. يرجى تسجيل الدخول أولاً بكلمة المرور ثم تفعيل البصمة');
            }

            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                
                const publicKeyCredentialRequestOptions = {
                    challenge: challenge,
                    timeout: 60000,
                    rpId: window.location.hostname === 'localhost' ? 'localhost' : window.location.hostname,
                    userVerification: "required",
                    allowCredentials: [{
                        id: new Uint8Array(foundCred.rawId),
                        type: "public-key"
                    }]
                };

                // هذا يستدعي نافذة بصمة الأندرويد الحقيقية
                const assertion = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                if (assertion) {
                    return foundUser;
                }
                return null;
            } catch (error) {
                console.error('Biometric authentication error:', error);
                if (error.name === 'NotAllowedError') {
                    throw new Error('تم إلغاء المصادقة');
                }
                throw new Error('فشلت المصادقة البيومترية');
            }
        }

        // ------------------- وظائف المستخدمين -------------------
        function validateUser(username, password) {
            const user = users.find(u => u.username === username);
            if (user && atob(user.password) === password) {
                return user;
            }
            return null;
        }

        function addUser(username, password) {
            if (users.find(u => u.username === username)) {
                return { success: false, message: 'اسم المستخدم موجود بالفعل' };
            }
            
            const newUser = {
                id: users.length + 1,
                username: username,
                password: btoa(password),
                hasBiometric: false,
                deviceId: null,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveUsers();
            
            return { success: true, message: 'تم إنشاء الحساب بنجاح', user: newUser };
        }

        function setLoggedIn(user, remember = false) {
            const sessionData = {
                username: user.username,
                userId: user.id,
                loginTime: new Date().toISOString(),
                method: 'biometric'
            };
            
            if (remember) {
                localStorage.setItem('systar_session', JSON.stringify(sessionData));
            } else {
                sessionStorage.setItem('systar_session', JSON.stringify(sessionData));
            }
            
            appUser = user;
            
            Swal.fire({
                icon: 'success',
                title: 'تم تسجيل الدخول بنجاح',
                text: `مرحباً بك ${user.username}`,
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'dashboard.html';
            });
        }

        // ------------------- تسجيل الدخول ببصمة الجهاز (بدون كتابة اسم مستخدم) -------------------
        async function loginWithDeviceBiometric() {
            // التحقق من دعم البصمة
            if (!await isBiometricAvailable()) {
                const authType = await getAuthenticatorType();
                Swal.fire({
                    icon: 'error',
                    title: 'البصمة غير مدعومة',
                    html: `جهازك لا يدعم المصادقة البيومترية.<br><br>
                           <strong>لتفعيل البصمة على أندرويد:</strong><br>
                           1. اذهب إلى الإعدادات<br>
                           2. الأمان > بصمة الأصابع<br>
                           3. أضف بصمة<br><br>
                           <strong>الأجهزة المدعومة:</strong><br>
                           • أندرويد 7+ مع Chrome<br>
                           • Windows Hello<br>
                           • Mac Touch ID`,
                    confirmButtonColor: '#2c7873'
                });
                return;
            }

            // عرض مربع حوار انتظار المصادقة
            const authType = await getAuthenticatorType();
            
            Swal.fire({
                title: 'مصادقة بصمة الجهاز',
                html: `
                    <div style="padding: 20px; text-align: center;">
                        <i class="fas fa-fingerprint" style="font-size: 70px; color: #2c7873; animation: pulse 1s infinite;"></i>
                        <p style="margin-top: 20px; font-size: 16px;">الرجاء استخدام <strong>${authType}</strong></p>
                        <p style="margin-top: 10px; font-size: 13px; color: #666;">ضع إصبعك على مستشعر البصمة</p>
                        <p style="margin-top: 5px; font-size: 12px; color: #999;">سيظهر الآن مربع حوار نظام التشغيل</p>
                    </div>
                    <style>
                        @keyframes pulse {
                            0%, 100% { opacity: 1; transform: scale(1); }
                            50% { opacity: 0.6; transform: scale(0.95); }
                        }
                    </style>
                `,
                showConfirmButton: false,
                allowOutsideClick: false,
                didOpen: async () => {
                    try {
                        // هذا يستدعي نافذة بصمة الأندرويد مباشرة
                        const user = await authenticateWithDeviceBiometric();
                        Swal.close();
                        
                        if (user) {
                            setLoggedIn(user, true);
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'فشل التحقق',
                                text: 'لم يتم التعرف على البصمة. يرجى المحاولة مرة أخرى',
                                confirmButtonColor: '#2c7873'
                            });
                        }
                    } catch (error) {
                        Swal.close();
                        Swal.fire({
                            icon: 'error',
                            title: 'خطأ',
                            text: error.message,
                            confirmButtonColor: '#2c7873'
                        });
                    }
                }
            });
        }

        // تفعيل البصمة لمستخدم معين (بعد تسجيل الدخول العادي)
        async function enableBiometricForUser(username) {
            const user = users.find(u => u.username === username);
            if (!user) {
                throw new Error('المستخدم غير موجود');
            }
            
            if (!await isBiometricAvailable()) {
                throw new Error('جهازك لا يدعم المصادقة البيومترية');
            }
            
            await registerDeviceBiometric(username);
            return true;
        }

        // ------------------- إنشاء حساب جديد -------------------
        function showRegisterModal() {
            Swal.fire({
                title: 'إنشاء حساب جديد',
                html: `
                    <input type="text" id="newUsername" class="swal2-input" placeholder="اسم المستخدم">
                    <input type="password" id="newPassword" class="swal2-input" placeholder="كلمة المرور">
                    <input type="password" id="confirmPassword" class="swal2-input" placeholder="تأكيد كلمة المرور">
                    <label style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px;">
                        <input type="checkbox" id="enableBiometric"> 
                        <span>تفعيل بصمة الجهاز (تسجيل الدخول بالبصمة لاحقاً)</span>
                    </label>
                `,
                confirmButtonText: 'إنشاء حساب',
                cancelButtonText: 'إلغاء',
                showCancelButton: true,
                confirmButtonColor: '#2c7873',
                preConfirm: () => {
                    const username = document.getElementById('newUsername').value.trim();
                    const password = document.getElementById('newPassword').value;
                    const confirm = document.getElementById('confirmPassword').value;
                    const enableBio = document.getElementById('enableBiometric').checked;
                    
                    if (!username) {
                        Swal.showValidationMessage('الرجاء إدخال اسم المستخدم');
                        return false;
                    }
                    
                    if (password.length < 6) {
                        Swal.showValidationMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                        return false;
                    }
                    
                    if (password !== confirm) {
                        Swal.showValidationMessage('كلمة المرور غير متطابقة');
                        return false;
                    }
                    
                    return { username, password, enableBio };
                }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const { username, password, enableBio } = result.value;
                    const addResult = addUser(username, password);
                    
                    if (addResult.success) {
                        if (enableBio && await isBiometricAvailable()) {
                            try {
                                await enableBiometricForUser(username);
                                Swal.fire({
                                    icon: 'success',
                                    title: 'تم إنشاء الحساب',
                                    text: `مرحباً ${username}! تم تفعيل بصمة الجهاز بنجاح. يمكنك الآن تسجيل الدخول بالبصمة.`,
                                    confirmButtonColor: '#2c7873'
                                });
                            } catch (error) {
                                Swal.fire({
                                    icon: 'warning',
                                    title: 'تم إنشاء الحساب',
                                    text: `تم إنشاء الحساب ولكن فشل تفعيل البصمة: ${error.message}`,
                                    confirmButtonColor: '#2c7873'
                                });
                            }
                        } else {
                            Swal.fire({
                                icon: 'success',
                                title: 'تم إنشاء الحساب',
                                text: `مرحباً ${username}! يمكنك الآن تسجيل الدخول.`,
                                confirmButtonColor: '#2c7873'
                            });
                        }
                    } else {
                        Swal.fire('خطأ', addResult.message, 'error');
                    }
                }
            });
        }

        // ------------------- وظائف الواجهة -------------------
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }

        function showAlert(message) {
            const alertBox = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            alertText.textContent = message;
            alertBox.classList.add('show');
            setTimeout(() => alertBox.classList.remove('show'), 5000);
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (!username || !password) {
                showAlert('الرجاء إدخال اسم المستخدم وكلمة المرور');
                return;
            }
            
            const user = validateUser(username, password);
            if (user) {
                setLoggedIn(user, rememberMe);
            } else {
                showAlert('اسم المستخدم أو كلمة المرور غير صحيحة');
            }
        }

        function forgotPassword() {
            Swal.fire({
                title: 'استعادة كلمة المرور',
                input: 'text',
                inputLabel: 'اسم المستخدم',
                showCancelButton: true,
                confirmButtonText: 'استعادة',
                confirmButtonColor: '#2c7873'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    const user = users.find(u => u.username === result.value);
                    if (user) {
                        const tempPassword = Math.random().toString(36).slice(-8);
                        const index = users.findIndex(u => u.id === user.id);
                        users[index].password = btoa(tempPassword);
                        saveUsers();
                        Swal.fire({
                            icon: 'success',
                            title: 'تم إعادة تعيين كلمة المرور',
                            html: `كلمة المرور الجديدة: <strong style="font-size: 20px;">${tempPassword}</strong>`,
                            confirmButtonColor: '#2c7873'
                        });
                    } else {
                        Swal.fire('خطأ', 'المستخدم غير موجود', 'error');
                    }
                }
            });
        }

        // التحقق من الجلسة الحالية
        function checkSession() {
            const session = localStorage.getItem('systar_session') || sessionStorage.getItem('systar_session');
            if (session) {
                const sessionData = JSON.parse(session);
                const loginTime = new Date(sessionData.loginTime);
                const now = new Date();
                const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
                
                if (hoursDiff < 24) {
                    window.location.href = 'dashboard.html';
                }
            }
        }

        // ------------------- التحقق من حالة البصمة -------------------
        async function checkBiometricStatus() {
            const supported = isWebAuthnSupported();
            const available = await isBiometricAvailable();
            const statusDiv = document.getElementById('biometricStatus');
            const statusText = document.getElementById('biometricStatusText');
            const bioBtn = document.getElementById('biometricLoginBtn');
            
            if (supported && available) {
                const authType = await getAuthenticatorType();
                statusText.innerHTML = `<i class="fas fa-check-circle" style="color: #10b981;"></i> ✓ البصمة جاهزة - ${authType}`;
                statusDiv.classList.add('show');
                bioBtn.disabled = false;
                bioBtn.style.opacity = '1';
            } else if (supported) {
                statusText.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #f59e0b;"></i> ⚠ البصمة غير متاحة - تأكد من إضافة بصمة في إعدادات الجهاز`;
                statusDiv.classList.add('show');
                bioBtn.disabled = true;
                bioBtn.style.opacity = '0.6';
            } else {
                statusText.innerHTML = `<i class="fas fa-times-circle" style="color: #ef4444;"></i> ✗ متصفحك لا يدعم WebAuthn - استخدم Chrome على أندرويد`;
                statusDiv.classList.add('show');
                bioBtn.disabled = true;
                bioBtn.style.opacity = '0.5';
            }
        }

        // ------------------- تهيئة الصفحة -------------------
        async function init() {
            loadUsers();
            checkSession();
            await checkBiometricStatus();
            
            document.getElementById('biometricLoginBtn').addEventListener('click', loginWithDeviceBiometric);
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('forgotPassword').addEventListener('click', (e) => {
                e.preventDefault();
                forgotPassword();
            });
            
            // رابط إنشاء حساب جديد
            const registerLink = document.querySelector('.register-link');
            if (registerLink) {
                registerLink.innerHTML = 'ليس لديك حساب؟ <a href="#" id="showRegister">إنشاء حساب جديد</a>';
                document.getElementById('showRegister').addEventListener('click', (e) => {
                    e.preventDefault();
                    showRegisterModal();
                });
            }
        }
        
        init();
    </script>
</body>
</html>
